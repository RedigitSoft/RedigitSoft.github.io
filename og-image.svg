<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2023"/>
      <stop offset="1" stop-color="#161719"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.16" cy="0.30" r="0.75">
      <stop offset="0" stop-color="#e9c46a" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#e9c46a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full square background so there is no padding after crop -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- OG artwork lives in the vertically-centered band y=285..915 (1200x630) -->
  <rect x="0" y="285" width="1200" height="6" fill="#e9c46a"/>

  <!-- Wordmark -->
  <text x="90" y="425" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-0.5">Redigit<tspan fill="#e9c46a">.</tspan></text>

  <!-- Headline -->
  <text font-family="-apple-system, Helvetica, Arial, sans-serif" font-weight="700"
        fill="#ffffff" letter-spacing="-1.5">
    <tspan x="90" y="600" font-size="72">We build thoughtful</tspan>
    <tspan x="90" y="686" font-size="72">cross-platform software.</tspan>
  </text>

  <!-- Sub-line -->
  <text x="92" y="770" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="28" font-weight="400" fill="rgba(255,255,255,0.72)">Kotlin Multiplatform · Android · iOS · Web · Desktop</text>

  <!-- Footer domain -->
  <text x="92" y="852" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" fill="#e9c46a" letter-spacing="0.5">redigit.io</text>
</svg>
